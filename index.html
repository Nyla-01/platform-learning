<!DOCTYPE html>
<html>
<head>
<title>Nyla-Tech Learning Platform</title>

<style>

* {
    box-sizing: border-box;
}

html {
    font-size: 16px;
}

body {
    background: #112f5c;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px #0f172a;
    background-color: rgb(234, 233, 233);
    border: 1px solid #312e81;
}

h2 {
    text-align: center;
    padding-bottom: 20px;
    font-size: clamp(20px, 5vw, 26px);
    background: #0d47a1;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0 0 20px 0;
}

label {
    display: block;
    font-weight: bold;
    font-size: clamp(13px, 3vw, 15px);
    color: #333333;
    margin-top: 10px;
}

input[type=text],
input[type=email],
input[type=password],
select {
    width: 100%;
    padding: clamp(8px, 2.5vw, 12px) clamp(8px, 2.5vw, 12px);
    margin: clamp(5px, 2vw, 10px) 0;
    border: 1.5px dashed #0a52f9;
    border-radius: 10px;
    background: transparent;
    color: rgb(0, 0, 0);
    box-sizing: border-box;
    outline: none;
    font-size: clamp(12px, 2.5vw, 13px);
    box-shadow: 0 0 10px rgba(85, 70, 95, 0.5);
}

input[type=submit] {
    width: 100%;
    margin-top: clamp(10px, 2vw, 14px);
    padding: clamp(10px, 2.5vw, 12px);
    border: none;
    border-radius: 5px;
    font-size: clamp(14px, 3vw, 16px);
    font-weight: 600;
    cursor: pointer;
    background-color: #0d47a1;
    color: white;
    transition: opacity 0.3s ease;
}

input[type=submit]:hover {
    opacity: 0.8;
}

.footer {
    text-align: center;
    margin-top: clamp(10px, 3vw, 20px);
    font-size: clamp(12px, 2.5vw, 14px);
    color: gray;
    line-height: 1.6;
}

/* ===== TABLET RESPONSIVENESS ===== */

@media screen and (max-width: 768px) {
    html {
        font-size: 15px;
    }
    
    .container {
        width: 95%;
        max-width: 600px;
        margin: 30px auto;
    }
}

/* ===== MOBILE RESPONSIVENESS ===== */

@media screen and (max-width: 480px) {
    html {
        font-size: 14px;
    }
    
    .container {
        width: 95%;
        margin: 15px;
        padding: 15px;
    }
    
    input[type=submit]:hover {
        opacity: 0.85;
    }
}

</style>
<link rel="shortcut icon" href="image/Your paragraph text-1.png" type="image/x-icon">

</head>

<body>

<div class="container">

<h2>Nyla</h2>

<form onsubmit="return submitForm()">

<label>Full Name:</label>
<input type="text" id="fullName" placeholder="Enter your full name" required>

<label>Email Address:</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label>Phone Number:</label>
<input type="text" id="phone" placeholder="Enter phone number" required>

<label>Password:</label>
<input type="password" id="password" placeholder="Create password" required>

<input type="submit" value="Register">

</form>

<!-- This is where the name will display -->
<div id="successMessage" style="margin-top:20px; font-weight:bold; color:green;"></div>

<div class="footer">
    <p>Already have account? <a href="login.html">Login here</a></p>
    Designed for Student Portal
</div>

</div>

<script>
function submitForm() {

    let name = document.getElementById("fullName").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    // Create user object
    let userData = {
        fullName: name,
        email: email,
        phone: phone,
        password: password,
        registeredDate: new Date().toLocaleDateString()
    };

    // Save user data in localStorage
    localStorage.setItem("studentName", name);
    localStorage.setItem("userData", JSON.stringify(userData));
    localStorage.setItem("isLoggedIn", "true");

    // Redirect to dashboard
    window.location.href = "dashboard.html";

    return false;
}
</script>

</body>
</html>
