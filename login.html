<!DOCTYPE html>
<html>
<head>
<title>Login - Nyla-Tech Learning Platform</title>

<style>

body {
    background: #112f5c;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

.container {
    width: 40%;
    margin: 40px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px #0f172a;
    background-color: rgb(234, 233, 233);
    border: 1px solid #312e81;
}

h2 {
    text-align: center;
    padding-bottom: 20px;
    font-size: 26px;
    background: #0d47a1;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

label {
    font-weight: bold;
    font-size: 15px;
    color: #333333;
}

::placeholder {
    font-size: 13px;
    color: black;
}

input[type=email],
input[type=password] {
    width: 100%;
    padding: 12px 12px;
    margin: 10px 0;
    border: 1.5px dashed #0a52f9;
    border-radius: 10px;
    background: transparent;
    color: rgb(0, 0, 0);
    box-sizing: border-box;
    outline: none;
    font-size: 13px;
    box-shadow: 0 0 10px rgba(85, 70, 95, 0.5)
}

input[type=submit] {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background-color: #0d47a1;
    color: white;
}

input[type=submit]:hover {
    opacity: 0.8;
}

.footer {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
    color: gray;
}

.error {
    color: red;
    margin-top: 10px;
    font-weight: bold;
}

.success {
    color: green;
    margin-top: 10px;
    font-weight: bold;
}

/* ===== MOBILE RESPONSIVENESS ===== */

@media screen and (max-width: 900px) {
    .container {
        width: 60%;
    }
}

@media screen and (max-width: 600px) {
    .container {
        width: 90%;
        margin: 20px auto;
    }

    h2 {
        font-size: 22px;
    }

    label {
        font-size: 14px;
    }

    input {
        font-size: 14px;
    }
}

</style>
<link rel="shortcut icon" href="image/Your paragraph text-1.png" type="image/x-icon">

</head>

<body>

<div class="container">

<h2>Login</h2>

<form onsubmit="return loginUser()">

<label>Email Address:</label>
<input type="email" id="loginEmail" placeholder="Enter your email" required>

<label>Password:</label>
<input type="password" id="loginPassword" placeholder="Enter your password" required>

<input type="submit" value="Login">

</form>

<div id="errorMessage" class="error"></div>

<div class="footer">
    <p>Don't have account? <a href="index.html">Register here</a></p>
    Designed for Student Portal
</div>

</div>

<script>
function loginUser() {

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;
    let errorMsg = document.getElementById("errorMessage");

    // Get stored user data
    let storedData = localStorage.getItem("userData");

    if (!storedData) {
        errorMsg.textContent = "❌ No user account found. Please register first.";
        return false;
    }

    let userData = JSON.parse(storedData);

    // Check if email and password match
    if (userData.email === email && userData.password === password) {
        // Set logged-in status
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("studentName", userData.fullName);
        
        // Redirect to dashboard
        window.location.href = "dashboard.html";
        return false;
    } else {
        errorMsg.textContent = "❌ Invalid email or password.";
        return false;
    }
}
</script>

</body>
</html>
